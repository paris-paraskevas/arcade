<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="/arcade-metrics.js"></script><script src="/arcade-client.js"></script>
<script defer src="/arcade-touch.js"></script>
<link rel="stylesheet" href="/game.css" />
<script defer src="/arcade-fit.js"></script>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<title>15 Puzzle</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100vh;
    background: radial-gradient(1000px 520px at 50% -8%, #161b29 0%, #0b0e14 60%, #070910 100%);
    color: #cdd6e4;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 28px 16px;
  }
  h1 {
    margin: 0; font-size: 22px; letter-spacing: 4px;
    font-weight: 600; color: #9fb4d4;
  }
  #wrap {
    position: relative;
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 18px 60px rgba(0,0,0,0.6);
    line-height: 0;
  }
  canvas {
    display: block;
    width: min(96vw, 460px);
    height: auto;
    background: #0a0d13;
  }
  .hint { font-size: 12px; color: #6b7890; letter-spacing: 1px; text-align: center; max-width: 460px; line-height: 1.7; }
  .hint b { color: #9fb4d4; font-weight: 600; }
  .hint a { color: #9fb4d4; text-decoration: none; }
</style>
</head>
<body>
  <h1>15 PUZZLE</h1>
  <div id="wrap">
    <canvas id="game" width="460" height="560"></canvas>
  </div>
  <div class="hint">
    <b>Click</b> a tile to slide &nbsp;·&nbsp; <b>Arrows</b> slide into the blank &nbsp;·&nbsp; <b>Space / Enter / R</b> new shuffle
    &nbsp;·&nbsp; <a href="../index.html" style="color:#9fb4d4;text-decoration:none">‹ arcade</a>
  </div>
  <!-- Classic script tag (NOT type="module") so it runs straight from file:// -->
  <script src="game.js"></script>
</body>
</html>
