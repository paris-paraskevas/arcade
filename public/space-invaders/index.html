<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Space Invaders</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100vh;
    background: radial-gradient(1000px 520px at 50% -10%, #141a26 0%, #0b0e14 60%);
    color: #cdd6e4;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 32px 16px;
  }
  h1 {
    margin: 0; font-size: 22px; letter-spacing: 4px;
    font-weight: 600; color: #9fb4d4;
  }
  #wrap {
    position: relative;
    box-shadow: 0 18px 60px rgba(0,0,0,0.6);
    border-radius: 14px; overflow: hidden;
    line-height: 0;
  }
  canvas {
    display: block;
    width: min(96vw, 700px);
    height: auto;
    background: #05060a;
  }
  .hint { font-size: 12px; color: #6b7890; letter-spacing: 1px; text-align: center; }
  .hint b { color: #9fb4d4; font-weight: 600; }
</style>
</head>
<body>
  <h1>SPACE INVADERS</h1>
  <div id="wrap">
    <canvas id="game" width="700" height="600"></canvas>
  </div>
  <div class="hint">
    <b style="color:#9fb4d4">&larr; &rarr;</b> / <b style="color:#9fb4d4">A D</b> move &nbsp;&middot;&nbsp;
    <b style="color:#9fb4d4">Space</b> shoot &nbsp;&middot;&nbsp;
    <b style="color:#9fb4d4">Space</b> / <b style="color:#9fb4d4">Enter</b> start / restart
    &nbsp;&middot;&nbsp; <a href="../index.html" style="color:#9fb4d4;text-decoration:none">&lsaquo; arcade</a>
  </div>
  <!-- Classic script tag (NOT type="module") so it runs straight from file:// -->
  <script src="game.js"></script>
</body>
</html>
