<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="/arcade-metrics.js"></script><script src="/arcade-client.js"></script>
<script defer src="/arcade-touch.js"></script>
<link rel="stylesheet" href="/game.css" />
<script defer src="/arcade-fit.js"></script>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<title>Weekend Racer</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; height: 100%;
    background: #0b0e14;
    color: #cdd6e4;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
  }
  h1 { margin: 0; font-size: 20px; letter-spacing: 4px; font-weight: 600; color: #9fb4d4; }
  #wrap {
    position: relative;
    box-shadow: 0 18px 60px rgba(0,0,0,0.6);
    border-radius: 10px; overflow: hidden;
    line-height: 0;
  }
  canvas {
    display: block;
    width: min(96vw, 960px);
    height: auto;
    image-rendering: optimizeQuality;
    background: #0f2747;
  }
  .hint { font-size: 12px; color: #6b7890; letter-spacing: 1px; }
  .hint b { color: #9fb4d4; font-weight: 600; }
</style>
</head>
<body>
  <h1>WEEKEND&nbsp;RACER</h1>
  <div id="wrap">
    <canvas id="game" width="960" height="600"></canvas>
  </div>
  <div class="hint">
    <b>↑ / W</b> accelerate &nbsp;·&nbsp; <b>↓ / S</b> brake &nbsp;·&nbsp;
    <b>← → / A D</b> steer &nbsp;·&nbsp; <b>Space</b> start / restart
    &nbsp;·&nbsp; <a href="../index.html" style="color:#9fb4d4;text-decoration:none">‹ arcade</a>
  </div>
  <script src="game.js"></script>
</body>
</html>
