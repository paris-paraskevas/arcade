<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script defer src="/arcade-touch.js"></script>
<link rel="stylesheet" href="/game.css" />
<script defer src="/arcade-fit.js"></script>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<title>Tron Light-Cycles</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100vh;
    background: radial-gradient(1000px 520px at 50% -10%, #0a1822 0%, #0b0e14 60%);
    color: #cdd6e4;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 32px 16px;
  }
  h1 {
    margin: 0; font-size: 22px; letter-spacing: 4px;
    font-weight: 600; color: #9fb4d4;
  }
  #wrap {
    position: relative;
    box-shadow: 0 18px 60px rgba(0,0,0,0.6);
    border-radius: 14px; overflow: hidden;
    line-height: 0;
  }
  canvas {
    display: block;
    width: min(96vw, 700px);
    height: auto;
    background: #05080e;
    touch-action: none;
  }
  .hint {
    font-size: 12px; color: #6b7890; letter-spacing: 1px;
    text-align: center; line-height: 1.8; max-width: 680px;
  }
  .hint b { color: #9fb4d4; font-weight: 600; }
  .hint a { color: #9fb4d4; text-decoration: none; }
</style>
</head>
<body>
  <h1>TRON LIGHT-CYCLES</h1>
  <div id="wrap">
    <canvas id="game" width="700" height="600"></canvas>
  </div>
  <div class="hint">
    P1 <b>W A S D</b> &nbsp;·&nbsp; P2 <b>← ↑ → ↓</b> &nbsp;·&nbsp; <b>Space</b>/<b>Enter</b> start / next round / rematch
    &nbsp;·&nbsp; <a href="../index.html" style="color:#9fb4d4;text-decoration:none">‹ arcade</a>
  </div>
  <!-- Classic script tag (NOT type="module") so it runs straight from file:// -->
  <script src="game.js"></script>
</body>
</html>
