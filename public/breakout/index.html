<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="/arcade-metrics.js"></script><script src="/arcade-client.js"></script>
<script defer src="/arcade-touch.js"></script>
<link rel="stylesheet" href="/game.css" />
<script defer src="/arcade-fit.js"></script>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<title>Breakout</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
  }
  body {
    background: radial-gradient(circle at 50% 30%, #131a26 0%, #0b0e14 60%, #070a0f 100%);
    color: #cdd6e4;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 12px;
    box-sizing: border-box;
  }
  h1 {
    margin: 0 0 18px;
    font-weight: 600;
    letter-spacing: 4px;
    color: #9fb4d4;
    text-transform: uppercase;
    font-size: clamp(24px, 5vw, 40px);
  }
  canvas {
    display: block;
    border-radius: 14px;
    box-shadow: 0 18px 60px rgba(0, 0, 0, .6);
    width: min(96vw, 800px);
    height: auto;
    background: #05070b;
    touch-action: none;
  }
  .hint {
    margin-top: 16px;
    font-size: 12px;
    color: #6b7890;
    text-align: center;
    line-height: 1.7;
    max-width: 760px;
  }
  .hint b { color: #9fb4d4; }
  .hint a { color: #9fb4d4; text-decoration: none; }
</style>
</head>
<body>
  <h1>Breakout</h1>
  <canvas id="game" width="800" height="600"></canvas>
  <div class="hint">
    Move with <b>Mouse</b> or <b>&larr; &rarr;</b> / <b>A D</b> &nbsp;&middot;&nbsp; Launch with <b>Space</b> or <b>Click</b> &nbsp;&middot;&nbsp; <b>P</b> to pause &nbsp;&middot;&nbsp; <a href="../index.html">&lsaquo; arcade</a>
  </div>
  <script src="game.js"></script>
</body>
</html>
