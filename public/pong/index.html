<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pong</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
  }
  body {
    background: radial-gradient(circle at 50% 30%, #131a26 0%, #0b0e14 60%, #070a0f 100%);
    color: #cdd6e4;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 12px;
    box-sizing: border-box;
  }
  h1 {
    margin: 0 0 18px;
    font-weight: 600;
    letter-spacing: 4px;
    color: #9fb4d4;
    text-transform: uppercase;
    font-size: clamp(24px, 5vw, 40px);
  }
  .wrap {
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 18px 60px rgba(0, 0, 0, .6);
    line-height: 0;
  }
  canvas {
    display: block;
    width: min(96vw, 800px);
    height: auto;
    background: #05070b;
    touch-action: none;
  }
  .hint {
    margin-top: 16px;
    font-size: 12px;
    color: #6b7890;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.8;
    max-width: 760px;
  }
  .hint b { color: #9fb4d4; }
  .hint a { color: #9fb4d4; text-decoration: none; }
</style>
</head>
<body>
  <h1>Pong</h1>
  <div class="wrap">
    <canvas id="game" width="800" height="500"></canvas>
  </div>
  <div class="hint">
    Left <b>W</b>/<b>S</b> &nbsp;·&nbsp; Right <b>&uarr;</b>/<b>&darr;</b> &nbsp;·&nbsp; <b>Space</b> serve / start &nbsp;·&nbsp; Title: <b>1</b> vs CPU / <b>2</b> two-player
    &nbsp;·&nbsp; <a href="../index.html" style="color:#9fb4d4;text-decoration:none">&lsaquo; arcade</a>
  </div>
  <script src="game.js"></script>
</body>
</html>
