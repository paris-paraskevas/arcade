<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script defer src="/arcade-touch.js"></script>
<link rel="stylesheet" href="/game.css" />
<script defer src="/arcade-fit.js"></script>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<title>Connect Four</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; min-height: 100%;
    background: radial-gradient(120% 120% at 50% 0%, #11161f 0%, #0b0e14 60%, #070910 100%);
    color: #cdd6e4;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    padding: 20px 0;
    box-sizing: border-box;
  }
  h1 {
    margin: 0; font-size: 22px; letter-spacing: 4px; font-weight: 600;
    color: #9fb4d4;
  }
  .wrap {
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 18px 60px rgba(0,0,0,0.6);
    line-height: 0;
  }
  canvas {
    display: block;
    width: min(96vw, 560px);
    height: auto;
    background: #0a0d13;
  }
  .hint { font-size: 12px; color: #6b7890; letter-spacing: 1px; text-align: center; max-width: 560px; line-height: 1.7; }
  .hint b { color: #9fb4d4; font-weight: 600; }
  .hint a { color: #9fb4d4; text-decoration: none; }
</style>
</head>
<body>
  <h1>CONNECT FOUR</h1>
  <div class="wrap">
    <canvas id="game" width="560" height="620"></canvas>
  </div>
  <div class="hint">
    <b>← →</b> move &nbsp;·&nbsp; <b>Space / ↓</b> drop &nbsp;·&nbsp; <b>click</b> a column &nbsp;·&nbsp;
    <b>R</b> reset &nbsp;·&nbsp; on title <b>1</b> vs CPU (pick <b>Easy/Medium/Hard/Unbeatable</b> · keys <b>1–4</b> or tap) / <b>2</b> hotseat
    &nbsp;·&nbsp; <a href="../index.html" style="color:#9fb4d4;text-decoration:none">‹ arcade</a>
  </div>
  <script src="game.js"></script>
</body>
</html>
